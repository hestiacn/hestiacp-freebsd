# wrangler.toml

name = "freebsd-pkg-proxy"
main = "worker/index.js"
compatibility_date = "2024-01-01"

[vars]
GITHUB_REPO = "hestiacn/hestiacp-freebsd"
GITHUB_TAG = "release"
R2_BUCKET_NAME = "fbsd-repo"
[[r2_buckets]]
binding = "R2_RESOURCES_BINDING"=
bucket_name = "fbsd-repo"=

# 自定义域名路由触发器
[[routes]]
pattern = "pkg.hestiamb.org/*"=

# ============================================================
# ⚙️ 生产部署环境 (wrangler deploy --env production)
# ============================================================
[env.production]
routes = [
  { pattern = "pkg.hestiamb.org/*" }
]
[env.production.vars]
GITHUB_TAG = "release"
MIRROR_BASE = ""

# ============================================================
# 🧪 测试部署环境 (wrangler deploy --env staging)
# ============================================================
[env.staging]
[env.staging.vars]
GITHUB_TAG = "main"