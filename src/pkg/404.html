			.mound {

				pointer-events: none;

			.mound:before {

				-webkit-transform: rotate(6deg) translateY(0px);
				transform: rotate(0deg) translateY(-10px);

				display: block;

			.mound_spade {
				display: block;

					top: -40px;

				}

				.ground {

	<body>
		<div class="content">
			<div class="color-overlay" id="colorOverlay"></div>
			<canvas class="snow" id="snow" width="1349" height="400"></canvas>
			<div class="main-text">
				<div>
					<svg
						class="info icon-large fa-question-circle"
						xmlns="http://www.w3.org/2000/svg"
						viewBox="0 0 512 512"
					>
						<path
							d="M504 256c0 136.997-111.043 248-248 248S8 392.997 8 256C8 119.083 119.043 8 256 8s248 111.083 248 248zM262.655 90c-54.497 0-89.255 22.957-116.549 63.758-3.536 5.286-2.353 12.415 2.715 16.258l34.699 26.31c5.205 3.947 12.621 3.008 16.665-2.122 17.864-22.658 30.113-35.797 57.303-35.797 20.429 0 45.698 13.148 45.698 32.958 0 14.976-12.363 22.667-32.534 33.976C247.128 238.528 216 254.941 216 296v4c0 6.627 5.373 12 12 12h56c6.627 0 12-5.373 12-12v-1.333c0-28.462 83.186-29.647 83.186-106.667 0-58.002-60.165-102-116.531-102zM256 338c-25.365 0-46 20.635-46 46 0 25.364 20.635 46 46 46s46-20.636 46-46c0-25.365-20.635-46-46-46z"
						></path>
					</svg>
				</div>
				<h2>哎呀！页面不见啦！</h2>
				<h2>错误代码:404</h2>
				<h2>对不起！您访问的文件不存在！请确认路径后重新访问！</h2>
				<h2>当前时间:公元<span id="currentDateTime"></span></h2>
				<h2 style="margin-top: 40px"><a href="/">返回首页</a></h2>
			</div>
			<div class="ground">
				<div class="mound">
					<div class="mound_text">404</div>
					<div class="mound_spade"></div>
				</div>
			</div>
		</div>
		<script>
			function updateDateTime() {
				const now = new Date();
				const year = now.getFullYear();
				const month = String(now.getMonth() + 1).padStart(2, "0");
				const day = String(now.getDate()).padStart(2, "0");
				const hour = String(now.getHours()).padStart(2, "0");
				const minute = String(now.getMinutes()).padStart(2, "0");
				const second = String(now.getSeconds()).padStart(2, "0");
				const formattedDateTime = `${year}年${month}月${day}日 ${hour}:${minute}:${second}`;
				document.getElementById("currentDateTime").textContent = formattedDateTime;
			}
			window.onload = function () {
				updateDateTime();
				setInterval(updateDateTime, 1000);
			};
		</script>
		<script>
			function animateBackground() {
				const overlay = document.getElementById("colorOverlay");
				let hue = 0;

				function updateColor() {
					hue = (hue + 0.6) % 360;
					overlay.style.backgroundColor = `hsla(${hue}, 80%, 50%, 1)`;
					requestAnimationFrame(updateColor);
				}
				updateColor();
			}

			window.onload = function () {
				updateDateTime();
				setInterval(updateDateTime, 1000);
				animateBackground();
			};
			(function () {
				function ready(fn) {
					if (document.readyState != "loading") {
						fn();
					} else {
						document.addEventListener("DOMContentLoaded", fn);
					}
				}

				function makeSnow(el) {
					var ctx = el.getContext("2d");
					var width = 0;
					var height = 0;
					var particles = [];

					var Particle = function () {
						this.x = this.y = this.dx = this.dy = 0;
						this.angle = Math.random() * Math.PI * 2;
						this.rotation = (Math.random() - 0.5) * 0.1;
						this.size = Math.random() * 4 + 3;
						this.points = 5 + Math.floor(Math.random() * 3);
						this.reset();
					};

					Particle.prototype.reset = function () {
						this.y = Math.random() * -height;
						this.x = Math.random() * width;
						this.dx = Math.random() * 2 - 1;
						this.dy = Math.random() * 1.5 + 1.2;
					};

					function createParticles(count) {
						particles = [];
						for (var i = 0; i < count; i++) {
							particles.push(new Particle());
						}
					}

					function drawStar(ctx, particle) {
						ctx.save();
						ctx.translate(particle.x, particle.y);
						ctx.rotate(particle.angle);
						ctx.fillStyle = "#f6f9fa";

						const outerRadius = particle.size;
						const innerRadius = outerRadius * 0.5;
						const step = Math.PI / particle.points;

						ctx.beginPath();
						for (let i = 0; i < 2 * particle.points; i++) {
							const radius = i % 2 === 0 ? outerRadius : innerRadius;
							const x = radius * Math.cos(i * step);
							const y = radius * Math.sin(i * step);
							if (i === 0) ctx.moveTo(x, y);
							else ctx.lineTo(x, y);
						}
						ctx.closePath();
						ctx.fill();

						ctx.restore();
					}

					function onResize() {
						width = window.innerWidth;
						height = window.innerHeight;
						el.width = width;
						el.height = height;
						createParticles((width * height) / 7000);
					}

					function updateParticles() {
						ctx.clearRect(0, 0, width, height);

						particles.forEach(function (particle) {
							particle.y += particle.dy;
							particle.x += particle.dx;
							particle.angle += particle.rotation;

							if (particle.y > height + 100 || particle.x < -100 || particle.x > width + 100) {
								particle.reset();
							}

							drawStar(ctx, particle);
						});

						window.requestAnimationFrame(updateParticles);
					}

					onResize();
					window.addEventListener("resize", onResize);
					updateParticles();
				}

				ready(function () {
					var canvas = document.getElementById("snow");
					makeSnow(canvas);
				});
			})();
		</script>
	</body>
