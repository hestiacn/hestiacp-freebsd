name: Build FreeBSD pkg Repository

on:
  release:
    types: [published]
  push:
    branches:
      - main
      - release
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to build"
        required: true
        default: "main"

jobs:
  build-and-deploy:
    name: Build pkg repository
    runs-on: ubuntu-latest
    strategy:
      matrix:
        freebsd_version: [14]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Build HestiaCP packages
        uses: vmactions/freebsd-vm@v1
        env:
          PKG_SIGNING_KEY: ${{ secrets.PKG_SIGNING_KEY }}
          PKG_SIGNING_KEY_PUB: ${{ secrets.PKG_SIGNING_KEY_PUB }}
        with:
          release: "${{ matrix.freebsd_version }}.0"
          usesh: true
          sync: rsync
          copyback: true
          run: |
            export IGNORE_OSVERSION=yes
            export ASSUME_ALWAYS_YES=yes
            
            WORKSPACE="/home/runner/work/hestiacp-freebsd/hestiacp-freebsd"
            cd "$WORKSPACE"

            echo "========================================"
            echo "Installing build dependencies..."
            echo "========================================"

            pkg install -y bash gmake perl5 git curl pkgconf autoconf automake libtool ca_root_nss npm node24 libxml2 libxslt bison libzip sqlite3 re2c gmp pcre2 openssl40 postgresql18-client xxhash libargon2 libsodium freetype2 jpeg-turbo webp png oniguruma ImageMagick7 cyrus-sasl libedit libffi aspell panda-cclient openldap26-client gcc14 gettext libiconv libarchive python3 binutils libmcrypt pcre2

            if [ ! -L /bin/bash ] && [ ! -f /bin/bash ]; then
                ln -sf /usr/local/bin/bash /bin/bash
                echo "[ ✓ ] Created symlink: /bin/bash -> /usr/local/bin/bash"
            fi

            echo ""
            echo "========================================"
            echo "Building PHP 8.4.23 with OpenSSL 4.x"
            echo "========================================"
            
            # 设置 OpenSSL 4.x 环境
            export OPENSSL_PREFIX="/usr/local"
            export OPENSSL_VERSION="4.x"
            export OPENSSL_INCLUDE="${OPENSSL_PREFIX}/include/openssl"
            export OPENSSL_LIB="${OPENSSL_PREFIX}/lib"
            export CFLAGS="-I${OPENSSL_INCLUDE} -I/usr/include -I/usr/local/include -Wno-deprecated-declarations"
            export LDFLAGS="-L${OPENSSL_LIB} -L/usr/lib -L/usr/local/lib"
            export PKG_CONFIG_PATH="${OPENSSL_LIB}/pkgconfig:/usr/local/lib/pkgconfig"
            export LD_LIBRARY_PATH="${OPENSSL_LIB}:/usr/lib"


            echo ""
            echo "========================================"
            echo "Building HestiaCP packages..."
            echo "========================================"

            export HESTIA_DEBUG=true
            chmod +x src/hst_autocompile-open4.sh

            /usr/local/bin/bash src/hst_autocompile-open4.sh --all --noinstall --keepbuild main 2>&1 | tee build.log
            EXIT_CODE=$?

            echo ""
            echo "=== Autocompile Exit code: $EXIT_CODE ==="

            if [ $EXIT_CODE -eq 0 ]; then
              echo "✅ Compilation completed successfully!"
            else
              echo "❌ Error: Compilation failed with exit code $EXIT_CODE"
              echo ""
              echo "=== Last 200 lines of build.log ==="
              tail -200 build.log
              exit 1
            fi

            echo ""
            echo "========================================"
            echo "Build artifacts:"
            echo "========================================"
            ls -la /tmp/hestiacp-src/pkg/
            ls -la "$ARTIFACT_DIR/"

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: hestia-pkgs-freebsd-${{ matrix.freebsd_version }}
          path: |
            /home/runner/work/hestiacp-freebsd/hestiacp-freebsd/artifacts/
            /home/runner/work/hestiacp-freebsd/hestiacp-freebsd/build.log
            /home/runner/work/hestiacp-freebsd/hestiacp-freebsd/build-php84-openssl4.log
          retention-days: 7

      - name: Upload PHP package
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: php84-openssl4-package
          path: /home/runner/work/hestiacp-freebsd/hestiacp-freebsd/artifacts/*.pkg
          retention-days: 30