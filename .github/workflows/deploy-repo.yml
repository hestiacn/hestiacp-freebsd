name: Build and Deploy FreeBSD pkg Repository

# 触发时机：当发布新 Release、往 main/release 分支推送代码，或者手动点击运行
on:
  release:
    types: [published]
  push:
    branches:
      - main
      - release
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: true
        default: 'main'

jobs:
  build-and-deploy:
    name: Build pkg repository and deploy to Cloudflare
    runs-on: ubuntu-latest
    steps:
      # 1. 检出最新源码
      - name: Checkout Repository
        uses: actions/checkout@v6
      
      # 2. 虚拟机内部：读取编译脚本测试 ➔ 现场编译 ➔ 私钥数字签署
      - name: Build HestiaCP packages
        uses: vmactions/freebsd-vm@v1
        with:
          release: '15.0'
          usesh: true
          sync: rsync
          run: |
            cd /home/runner/work/hestiacp-freebsd/hestiacp-freebsd
            
            pkg install -y bash gmake perl5 git curl pkgconf openssl pcre2 autoconf automake libtool ca_root_nss npm node libxml2 libxslt bison libzip sqlite3 re2c
            
            export HESTIA_DEBUG=true
            
            chmod +x src/hst_autocompile.sh
            
            # 直接运行，让所有输出显示在控制台（不通过 tee）
            bash -x src/hst_autocompile.sh --all --noinstall --keepbuild main 2>&1
            EXIT_CODE=$?

            echo "=== nginx configure and build errors ==="
            sed -n '/\.\/configure/,/gmake: \*\*\*/p' nginx-build.log | grep -E "(error|Error|ERROR|warning|missing|not found|cannot|No such|failed|undefined)"
            
            # 显示 gmake 错误行及其前后 10 行
            echo "=== gmake error context ==="
            grep -B 10 -A 5 "gmake: \*\*\*" nginx-build.log

            echo "=== Exit code: $EXIT_CODE ==="
            
            if [ $EXIT_CODE -eq 0 ]; then
              echo "[ ✓ ] Compilation completed successfully!"
            else
              echo "[ ✗ ] Error: Compilation failed with exit code $EXIT_CODE"
              exit 1
            fi
            
            # 注入私钥并签名
            mkdir -p keys
            echo "${{ secrets.FBSD_REPO_KEY }}" > keys/hestiacp.key
            chmod 600 keys/hestiacp.key
            
            # 检查 pkg 目录是否存在
            if [ ! -d "/tmp/hestiacp-src/pkg" ]; then
              echo "[ ✗ ] Error: /tmp/hestiacp-src/pkg directory not found!"
              echo "Build may have failed to generate packages."
              exit 1
            fi
            
            cd /tmp/hestiacp-src/pkg
            pkg repo . ../keys/hestiacp.key
            
            if [ $? -ne 0 ]; then
              echo "[ ✗ ] Failed to sign repository!"
              exit 1
            fi
            
            # 准备产物
            mkdir -p /home/runner/work/hestiacp-freebsd/hestiacp-freebsd/final-packages
            cp -R ./* /home/runner/work/hestiacp-freebsd/hestiacp-freebsd/final-packages/
            cp ../keys/hestiacp.key.pub /home/runner/work/hestiacp-freebsd/hestiacp-freebsd/final-packages/ 2>/dev/null || true
            
            echo ""
            echo "=== Build artifacts ==="
            echo '```'
            ls -la /home/runner/work/hestiacp-freebsd/hestiacp-freebsd/final-packages/
            echo '```'
            echo ""
            echo "[ ✓ ] Repository signed and artifacts prepared successfully!"

      # 3. 将编译并签好名的所有二进制大包增量空投至 R2 存储桶
      - name: Sync Packages to Cloudflare R2
        uses: jakejarvis/s3-sync-action@master
        with:
          args: --follow-symlinks --delete
        env:
          AWS_S3_BUCKET: 'fbsd-repo'
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_S3_ENDPOINT: ${{ secrets.R2_ACCOUNT_ENDPOINT }}
          AWS_REGION: 'auto'
          SOURCE_DIR: 'final-packages'

      # 4. 云端部署边缘计算 Worker 脚本
      - name: Deploy Cloudflare Worker
        run: |
          npm install
          npx wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

  update-client-script:
    name: Update client setup script
    runs-on: ubuntu-latest
    needs: build-and-deploy
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      
      # 5. 动态生成功能绝对完整的纯英文一键接入配置自愈脚本
      - name: Generate client script
        run: |
          cat > setup-client.sh << 'EOF'
          #!/bin/sh
          # Automatically generated by GitHub Actions CI/CD for FreeBSD
          # Dedicated Edition - Aligned with Cloudflare R2 static mapping

          REPO_URL="https://pkg.hestiamb.org"
          REPO_NAME="hestiacp"

          echo "=== HestiaCP FreeBSD pkg Repository Installer ==="

          if [ "$(id -u)" != "0" ]; then
              echo "Error: This script must be run as root privileges."
              exit 1
          fi

          if ! grep -q "FreeBSD" /etc/os-release 2>/dev/null && ! uname -a | grep -q "FreeBSD"; then
              echo "Error: This script is exclusively tailored for FreeBSD systems."
              exit 1
          fi

          echo "Detected System Environment: $(uname -a | head -1)"

          mkdir -p /usr/local/etc/pkg/keys
          mkdir -p /usr/local/etc/pkg/repos

          echo "Downloading public key from cloud edge node..."
          if command -v fetch >/dev/null 2>&1; then
              fetch -o /usr/local/etc/pkg/keys/hestiacp.pub ${REPO_URL}/hestiacp.pub
          else
              curl -s -o /usr/local/etc/pkg/keys/hestiacp.pub ${REPO_URL}/hestiacp.pub
          fi

          if [ ! -s /usr/local/etc/pkg/keys/hestiacp.pub ]; then
              echo "Error: Failed to fetch secure public key signature asset."
              exit 1
          fi

          if [ -f "/usr/local/etc/pkg/repos/${REPO_NAME}.conf" ]; then
              cp "/usr/local/etc/pkg/repos/${REPO_NAME}.conf" "/usr/local/etc/pkg/repos/${REPO_NAME}.conf.bak"
          fi
          echo "Writing repository tracking configuration..."
          
          printf "%s:\n{\n  url: \"%s\",\n  signature_type: \"pubkey\",\n  pubkey: \"/usr/local/etc/pkg/keys/hestiacp.pub\",\n  enabled: yes,\n  mirror_type: \"http\",\n  priority: 100\n}\n" "${REPO_NAME}" "${REPO_URL}" > /usr/local/etc/pkg/repos/${REPO_NAME}.conf

          echo "Repository tracker configuration registered."
          
          if pkg update -f; then
              echo "=== ✓ Repository configured successfully! ==="
              echo "You can now execute standard deployment commands natively:"
              echo "  pkg install hestia"
          else
              echo "=== ✗ Repository metadata tracking synchronization failed ==="
              exit 1
          fi
          EOF
          
          chmod +x setup-client.sh

      # 6. 将生成完毕的脚本无感追加推入同一个 R2 存储桶中
      - name: Upload client script to R2
        uses: jakejarvis/s3-sync-action@master
        with:
          args: --follow-symlinks
        env:
          AWS_S3_BUCKET: 'fbsd-repo'
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_S3_ENDPOINT: ${{ secrets.R2_ACCOUNT_ENDPOINT }}
          AWS_REGION: 'auto'
          SOURCE_DIR: '.'