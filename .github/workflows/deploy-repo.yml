name: Build and Deploy FreeBSD pkg Repository

# 触发时机：当发布新 Release、往 main/release 分支推送代码，或者手动点击运行
on:
  release:
    types: [published]
  push:
    branches:
      - main
      - release
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to build"
        required: true
        default: "main"

jobs:
  build-and-deploy:
    name: Build pkg repository and deploy to Cloudflare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        freebsd_version: [14, 15]
    steps:
      # 1. 检出最新源码
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Build HestiaCP packages for FreeBSD ${{ matrix.freebsd_version }}
        uses: vmactions/freebsd-vm@v1
        with:
          release: "${{ matrix.freebsd_version }}.0"
          usesh: true
          sync: rsync
          copyback: true # 将产物复制回 runner
          run: |
            cd /home/runner/work/hestiacp-freebsd/hestiacp-freebsd

            pkg install -y bash gmake perl5 git curl pkgconf openssl pcre2 autoconf automake libtool ca_root_nss npm node libxml2 libxslt bison libzip sqlite3 re2c gmp python oniguruma

            export HESTIA_DEBUG=true

            chmod +x src/hst_autocompile.sh

            # 编译并保存日志
            bash src/hst_autocompile.sh --all --noinstall --keepbuild main 2>&1 | tee build.log
            EXIT_CODE=$?

            echo "=== Exit code: $EXIT_CODE ==="

            if [ $EXIT_CODE -eq 0 ]; then
              echo "[ ✓ ] Compilation completed successfully!"
            else
              echo "[ ✗ ] Error: Compilation failed with exit code $EXIT_CODE"
              echo "=== Last 200 lines of build.log ==="
              tail -200 build.log
              exit 1
            fi
            
            cd /tmp/hestiacp-src/pkg || {
              echo "[ ✗ ] Failed to cd to /tmp/hestiacp-src/pkg"
              echo "=== Contents of /tmp/hestiacp-src ==="
              ls -la /tmp/hestiacp-src/
              exit 1
            }

            echo "=== Current directory: $(pwd) ==="
            echo "=== Package files ==="
            ls -la
            # 准备签名密钥目录（在正确的位置）
            cd /tmp/hestiacp-src
            mkdir -p keys

            # 导入私钥用于签名 - 使用 printf 避免特殊字符问题
            printf "%s" "${{ secrets.PKG_SIGNING_KEY }}" > keys/hestiacp.key
            chmod 600 keys/hestiacp.key

            echo "[ ✓ ] Private key imported for signing"
            echo "Key location: /tmp/hestiacp-src/keys/hestiacp.key"
            ls -la keys/

            cd /tmp/hestiacp-src/pkg

            echo "=== Current directory: $(pwd) ==="
            echo "=== Package files ==="
            ls -la

            # 更新 pkg 并重试
            pkg update -f -y
            pkg upgrade -y pkg

            # 使用绝对路径签名仓库
            echo "[ * ] Signing repository with private key..."
            if [ -s /tmp/hestiacp-src/keys/hestiacp.key ]; then
              echo "[ * ] Signing repository with private key..."
              pkg repo . /tmp/hestiacp-src/keys/hestiacp.key
              if [ $? -ne 0 ]; then
                echo "[ ✗ ] Failed to sign repository!"
                echo "=== Debug information ==="
                echo "Key file exists:"
                ls -la /tmp/hestiacp-src/keys/
                echo "=== meta.conf content ==="
                cat meta.conf || echo "meta.conf not found"
                echo "=== Directory contents ==="
                echo "=== Current directory: $(pwd) ==="
                ls -la
                exit 1
              fi
              echo "[ ✓ ] Repository signed successfully!"
            else
              echo "[ ⚠️ ] No signing key found or key is empty, creating repository without signature"
              pkg repo .
            fi

            # 准备产物 - 包含公钥供客户端下载
            mkdir -p final-packages

            # 复制签名后的包文件到 final-packages
            cp -R ./* final-packages/

            # 复制公钥到产物目录（客户端需要）
            if [ -n "${{ secrets.PKG_SIGNING_KEY_PUB }}" ]; then
              printf "%s" "${{ secrets.PKG_SIGNING_KEY_PUB }}" > final-packages/hestiacp.pub
              echo "[ ✓ ] Public key added"
            else
              echo "[ ⚠️ ] No public key available"
            fi

            # 验证签名文件
            echo "=== Verifying signature ==="
            ls -la final-packages/ | grep -E "(digests|meta|packagesite)"

            cp /home/runner/work/hestiacp-freebsd/hestiacp-freebsd/src/pkg/index.html final-packages/
            cp /home/runner/work/hestiacp-freebsd/hestiacp-freebsd/src/pkg/404.html final-packages/

            if [ -f "final-packages/digests.sig" ] || [ -f "final-packages/packagesite.sig" ]; then
              echo "[ ✓ ] Repository signed successfully! Signature files found."
            else
              echo "[ ⚠️ ] Warning: No .sig files found, but continuing..."
            fi

            echo "=== final-packages contents ==="
            ls -la final-packages/

            # 将产物复制到 GitHub runner 的工作目录（通过 copyback）
            mkdir -p /home/runner/work/hestiacp-freebsd/hestiacp-freebsd/artifacts/FreeBSD:${{ matrix.freebsd_version }}:amd64/latest
            cp -R final-packages/* /home/runner/work/hestiacp-freebsd/hestiacp-freebsd/artifacts/FreeBSD:${{ matrix.freebsd_version }}:amd64/latest/

            echo "[ ✓ ] Build and sign completed successfully for FreeBSD ${{ matrix.freebsd_version }}!"
      # 在 Build HestiaCP packages 步骤之后，添加这个新步骤
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-log-FreeBSD-${{ matrix.freebsd_version }}
          path: build.log
          retention-days: 7
      - name: Extract and format build log
        if: always() # 即使编译失败也运行
        run: |
          # 检查 build.log 是否存在
          if [ ! -f "build.log" ]; then
            echo "❌ build.log not found!"
            echo "Current directory contents:"
            ls -la
            exit 0
          fi

          echo "✅ build.log found, size: $(wc -l < build.log) lines"

          cat > build-report-FreeBSD${{ matrix.freebsd_version }}.md << 'EOF'
          # HestiaCP FreeBSD Build Report - FreeBSD ${{ matrix.freebsd_version }}

          ## Build Information
          | 项目 | 值 |
          |------|-----|
          | 构建时间 | $(date -u +"%Y-%m-%d %H:%M:%S UTC") |
          | 分支 | ${{ github.ref_name }} |
          | 提交 | ${{ github.sha }} |
          | FreeBSD版本 | ${{ matrix.freebsd_version }} |

          EOF

          # 提取版本信息
          echo "## Version Information" >> build-report-FreeBSD${{ matrix.freebsd_version }}.md
          echo '```' >> build-report-FreeBSD${{ matrix.freebsd_version }}.md
          grep -E "Build version|Nginx version|PHP version|Web Terminal version" build.log | head -10 >> build-report-FreeBSD${{ matrix.freebsd_version }}.md || echo "未找到版本信息" >> build-report-FreeBSD${{ matrix.freebsd_version }}.md
          echo '```' >> build-report-FreeBSD${{ matrix.freebsd_version }}.md

          # 提取编译状态
          echo "" >> build-report-FreeBSD${{ matrix.freebsd_version }}.md
          echo "## Build Status" >> build-report-FreeBSD${{ matrix.freebsd_version }}.md
          if grep -q "Compilation completed successfully" build.log 2>/dev/null; then
            echo "✅ **编译成功**" >> build-report-FreeBSD${{ matrix.freebsd_version }}.md
          else
            echo "❌ **编译失败**" >> build-report-FreeBSD${{ matrix.freebsd_version }}.md
          fi

          # 提取错误和警告
          echo "" >> build-report-FreeBSD${{ matrix.freebsd_version }}.md
          echo "## Errors and Warnings" >> build-report-FreeBSD${{ matrix.freebsd_version }}.md
          echo '```' >> build-report-FreeBSD${{ matrix.freebsd_version }}.md
          grep -E "error|Error|ERROR|warning|Warning|WARNING|failed|Failed|not found" build.log | head -30 >> build-report-FreeBSD${{ matrix.freebsd_version }}.md || echo "无错误或警告" >> build-report-FreeBSD${{ matrix.freebsd_version }}.md
          echo '```' >> build-report-FreeBSD${{ matrix.freebsd_version }}.md

          # 提取包文件大小
          echo "" >> build-report-FreeBSD${{ matrix.freebsd_version }}.md
          echo "## Package Sizes" >> build-report-FreeBSD${{ matrix.freebsd_version }}.md
          echo '```' >> build-report-FreeBSD${{ matrix.freebsd_version }}.md
          grep -E "\.pkg" build.log | grep -E "rw-r|size" >> build-report-FreeBSD${{ matrix.freebsd_version }}.md || echo "未找到包文件信息" >> build-report-FreeBSD${{ matrix.freebsd_version }}.md
          echo '```' >> build-report-FreeBSD${{ matrix.freebsd_version }}.md

          # 提取签名状态
          echo "" >> build-report-FreeBSD${{ matrix.freebsd_version }}.md
          echo "## Signing Status" >> build-report-FreeBSD${{ matrix.freebsd_version }}.md
          if grep -q "Repository signed successfully" build.log 2>/dev/null; then
            echo "✅ **仓库签名成功**" >> build-report-FreeBSD${{ matrix.freebsd_version }}.md
          else
            echo "❌ **仓库签名失败**" >> build-report-FreeBSD${{ matrix.freebsd_version }}.md
          fi

          # 提取关键配置检查
          echo "" >> build-report-FreeBSD${{ matrix.freebsd_version }}.md
          echo "## Key Checks" >> build-report-FreeBSD${{ matrix.freebsd_version }}.md
          echo '```' >> build-report-FreeBSD${{ matrix.freebsd_version }}.md
          grep -E "checking for|detected|found|using" build.log | head -20 >> build-report-FreeBSD${{ matrix.freebsd_version }}.md || echo "未找到配置检查信息" >> build-report-FreeBSD${{ matrix.freebsd_version }}.md
          echo '```' >> build-report-FreeBSD${{ matrix.freebsd_version }}.md

          # 提取依赖安装状态
          echo "" >> build-report-FreeBSD${{ matrix.freebsd_version }}.md
          echo "## Dependencies" >> build-report-FreeBSD${{ matrix.freebsd_version }}.md
          echo '```' >> build-report-FreeBSD${{ matrix.freebsd_version }}.md
          grep -E "Installing|pkg install|oniguruma" build.log | head -15 >> build-report-FreeBSD${{ matrix.freebsd_version }}.md || echo "未找到依赖安装信息" >> build-report-FreeBSD${{ matrix.freebsd_version }}.md
          echo '```' >> build-report-FreeBSD${{ matrix.freebsd_version }}.md

          # 提取最终产物
          echo "" >> build-report-FreeBSD${{ matrix.freebsd_version }}.md
          echo "## Build Artifacts" >> build-report-FreeBSD${{ matrix.freebsd_version }}.md
          echo '```' >> build-report-FreeBSD${{ matrix.freebsd_version }}.md
          grep -E "final-packages|artifacts|Build artifacts" build.log | head -10 >> build-report-FreeBSD${{ matrix.freebsd_version }}.md || echo "未找到产物信息" >> build-report-FreeBSD${{ matrix.freebsd_version }}.md
          echo '```' >> build-report-FreeBSD${{ matrix.freebsd_version }}.md

          # 添加退出码
          echo "" >> build-report-FreeBSD${{ matrix.freebsd_version }}.md
          echo "## Exit Code" >> build-report-FreeBSD${{ matrix.freebsd_version }}.md
          echo '```' >> build-report-FreeBSD${{ matrix.freebsd_version }}.md
          grep "Exit code:" build.log | tail -1 >> build-report-FreeBSD${{ matrix.freebsd_version }}.md || echo "未找到退出码" >> build-report-FreeBSD${{ matrix.freebsd_version }}.md
          echo '```' >> build-report-FreeBSD${{ matrix.freebsd_version }}.md

          echo "" >> build-report-FreeBSD${{ matrix.freebsd_version }}.md
          echo "---" >> build-report-FreeBSD${{ matrix.freebsd_version }}.md
          echo "*报告由 GitHub Actions 自动生成*" >> build-report-FreeBSD${{ matrix.freebsd_version }}.md

          echo "✅ Build report generated: build-report-FreeBSD${{ matrix.freebsd_version }}.md"
          cat build-report-FreeBSD${{ matrix.freebsd_version }}.md

      # 上传报告作为 artifact
      - name: Upload build report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-report-FreeBSD${{ matrix.freebsd_version }}
          path: build-report-FreeBSD${{ matrix.freebsd_version }}.md
          retention-days: 7

      # 3. 上传到 Cloudflare R2
      - name: Sync Packages to Cloudflare R2
        run: |
          VERSION_PATH="FreeBSD:${{ matrix.freebsd_version }}:amd64/latest"
          ARTIFACT_PATH="artifacts/$VERSION_PATH"
          
          if [ ! -d "$ARTIFACT_PATH" ]; then
            echo "Error: artifacts directory not found at $ARTIFACT_PATH!"
            echo "Available artifacts:"
            find artifacts -type d 2>/dev/null || echo "No artifacts found"
            exit 1
          fi

          echo "=== Artifacts to upload for FreeBSD ${{ matrix.freebsd_version }} ==="
          ls -la "$ARTIFACT_PATH"

          ENDPOINT="${{ secrets.R2_ACCOUNT_ENDPOINT }}"
          if [[ ! "$ENDPOINT" =~ ^https?:// ]]; then
            ENDPOINT="https://$ENDPOINT"
          fi

          echo "Syncing $ARTIFACT_PATH to s3://fbsd-repo/$VERSION_PATH/"
          
          aws s3 sync "$ARTIFACT_PATH/" "s3://fbsd-repo/$VERSION_PATH/" \
            --endpoint-url "$ENDPOINT" \
            --follow-symlinks \
            --delete \
            --region auto
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

      # 3.5 验证上传（可选）
      - name: Verify upload
        run: |
          ENDPOINT="${{ secrets.R2_ACCOUNT_ENDPOINT }}"
          if [[ ! "$ENDPOINT" =~ ^https?:// ]]; then
            ENDPOINT="https://$ENDPOINT"
          fi

          VERSION_PATH="FreeBSD:${{ matrix.freebsd_version }}:amd64/latest"
          echo "Verifying uploaded files for $VERSION_PATH..."
          aws s3 ls "s3://fbsd-repo/$VERSION_PATH/" --endpoint-url "$ENDPOINT" --recursive --human-readable
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

      # 4. 云端部署边缘计算 Worker 脚本
      - name: Deploy Cloudflare Worker
        run: |
          mkdir -p /tmp/worker-deploy
          cd /tmp/worker-deploy
          cat > worker.js << 'WORKER_EOF'
          const sslRedirectScript = `
            <script>
              if (window.location.protocol === 'http:') {
                window.location.href = window.location.href.replace(/^http:/i, 'https:');
              }
            </script>
          `;

          class HeadInjector {
            element(element) {
              element.prepend(sslRedirectScript, { html: true });
            }
          }

          var worker_default = {
            async fetch(request, env) {
              const url = new URL(request.url);
              if (url.hostname !== "pkg.hestiamb.org") {
                const secureUrl = new URL(request.url);
                secureUrl.protocol = "https:";
                secureUrl.hostname = "pkg.hestiamb.org";
                
                return new Response(null, {
                  status: 301,
                  headers: {
                    "Location": secureUrl.toString(),
                    "Cache-Control": "public, max-age=31536000",
                    "Alt-Svc": 'h3=":443"; ma=31536000; persist=1'
                  }
                });
              }
              let path = url.pathname.slice(1) || "index.html";
              let object = await env.FBSD_REPO.get(path);
              let isNotFound = false;
              
              if (!object) {
                isNotFound = true;
                object = await env.FBSD_REPO.get("404.html");
                if (!object) {
                  return new Response("404 - Not Found", { status: 404 });
                }
              }
              const headers = new Headers();
              object.writeHttpMetadata(headers);
              headers.set("Alt-Svc", 'h3=":443"; ma=31536000; persist=1');
              if (path.endsWith(".html") || isNotFound) {
                headers.set("content-type", "text/html; charset=utf-8");
              } else if (path.endsWith(".sh") || path.endsWith(".pub") || path.endsWith(".sig")) {
                headers.set("content-type", "text/plain; charset=utf-8");
              } else if (path.endsWith(".pkg")) {
                headers.set("content-type", "application/octet-stream");
              }
              const response = new Response(object.body, { 
                status: isNotFound ? 404 : 200, 
                headers 
              });
              const contentType = headers.get("content-type") || "";
              if (contentType.includes("text/html")) {
                return new HTMLRewriter()
                  .on("head", new HeadInjector())
                  .transform(response);
              }
              
              return response;
            }
          };

          export {
            worker_default as default
          };
          WORKER_EOF
          cat > wrangler.toml << 'TOML_EOF'
          name = "hestiacp-repo"
          main = "worker.js"
          compatibility_date = "2024-12-18"
          workers_dev = false

          [[r2_buckets]]
          binding = "FBSD_REPO"
          bucket_name = "fbsd-repo"
          TOML_EOF

          echo "[ * ] Dispatching clean Cloudflare Worker code deployment with HTTP/3 support..."
          npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
