name: Build and Deploy FreeBSD pkg Repository

# 触发时机：当发布新 Release、往 main/release 分支推送代码，或者手动点击运行
on:
  release:
    types: [published]
  push:
    branches:
      - main
      - release
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to build"
        required: true
        default: "main"

jobs:
  build-and-deploy:
    name: Build pkg repository and deploy to Cloudflare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        freebsd_version: [14, 15]
    steps:
      # 1. 检出最新源码
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Build HestiaCP packages
        uses: vmactions/freebsd-vm@v1
        env:
          PKG_SIGNING_KEY: ${{ secrets.PKG_SIGNING_KEY }}
          PKG_SIGNING_KEY_PUB: ${{ secrets.PKG_SIGNING_KEY_PUB }}
        with:
          release: "${{ matrix.freebsd_version }}.0"
          usesh: true
          sync: rsync
          copyback: true # 将产物复制回 runner
          run: |
            export PKG_SIGNING_KEY="${{ secrets.PKG_SIGNING_KEY }}"
            export PKG_SIGNING_KEY_PUB="${{ secrets.PKG_SIGNING_KEY_PUB }}"
            
            cd /home/runner/work/hestiacp-freebsd/hestiacp-freebsd

            pkg install -y bash gmake perl5 git curl pkgconf openssl pcre2 autoconf automake libtool ca_root_nss npm node libxml2 libxslt bison libzip sqlite3 re2c gmp python oniguruma
            # 创建 bash 软链接
            if [ ! -L /bin/bash ] && [ ! -f /bin/bash ]; then
                ln -sf /usr/local/bin/bash /bin/bash
                echo "[ ✓ ] Created symlink: /bin/bash -> /usr/local/bin/bash"
            fi
            export HESTIA_DEBUG=true

            chmod +x src/hst_autocompile.sh

            # 编译并保存日志
            bash src/hst_autocompile.sh --all --noinstall --keepbuild main 2>&1 | tee build.log
            EXIT_CODE=$?

            echo "=== Exit code: $EXIT_CODE ==="

            if [ $EXIT_CODE -eq 0 ]; then
              echo "[ ✓ ] Compilation completed successfully!"
            else
              echo "[ ✗ ] Error: Compilation failed with exit code $EXIT_CODE"
              echo "=== Last 200 lines of build.log ==="
              tail -200 build.log
              exit 1
            fi

            # 准备签名密钥目录（在正确的位置）
            cd /tmp/hestiacp-src
            mkdir -p keys

            # 导入私钥用于签名
            printf "%s" "$PKG_SIGNING_KEY" > keys/hestiacp.key
            chmod 600 keys/hestiacp.key

            echo "[ ✓ ] Private key imported for signing"
            echo "Key location: /tmp/hestiacp-src/keys/hestiacp.key"
            ls -la keys/

            cd pkg

            echo "=== Current directory: $(pwd) ==="
            echo "=== Package files ==="
            ls -la

            # 更新 pkg 并重试
            pkg upgrade -y pkg

            # 使用绝对路径签名仓库
            echo "[ * ] Signing repository with private key..."
            pkg repo . /tmp/hestiacp-src/keys/hestiacp.key

            if [ $? -ne 0 ]; then
              echo "[ ✗ ] Failed to sign repository!"
              echo "=== Debug information ==="
              echo "Key file exists:"
              ls -la /tmp/hestiacp-src/keys/
              echo "=== meta.conf content ==="
              cat meta.conf || echo "meta.conf not found"
              echo "=== Directory contents ==="
              ls -la
              exit 1
            fi

            echo "[ ✓ ] Repository signed successfully!"
            FREEBSD_MAJOR=$(uname -r | cut -d. -f1)
            EXPORT_PATH="/tmp/hestiacp-src/FreeBSD:${FREEBSD_MAJOR}:amd64/latest"
            mkdir -p "$EXPORT_PATH"
            cp -R /tmp/hestiacp-src/pkg/* "$EXPORT_PATH/"
            printf "%s" "$PKG_SIGNING_KEY_PUB" > "$EXPORT_PATH/hestia.pub"
            VM_BRIDGE="/tmp/hestiacp-src/final-r2-tree"
            mkdir -p "$VM_BRIDGE"
            cp -R /tmp/hestiacp-src/FreeBSD* "$VM_BRIDGE/"
            cp ../../home/runner/work/hestiacp-freebsd/hestiacp-freebsd/src/pkg/index.html "$VM_BRIDGE/" 2>/dev/null || cp /home/runner/work/hestiacp-freebsd/hestiacp-freebsd/src/pkg/index.html "$VM_BRIDGE/" || true
            cp ../../home/runner/work/hestiacp-freebsd/hestiacp-freebsd/src/pkg/404.html "$VM_BRIDGE/" 2>/dev/null || cp /home/runner/work/hestiacp-freebsd/hestiacp-freebsd/src/pkg/404.html "$VM_BRIDGE/" || true
            mkdir -p artifacts-bridge
            cp -R "$VM_BRIDGE"/* artifacts-bridge/ || true
            
            echo "[ ✓ ] Complete tree structured securely inside VM /tmp/hestiacp-src!"
            
      - name: Relocate and Realign Assets on Host
        run: |
          mkdir -p artifacts
          FOUND_DIR=$(find /home/runner/work/ -type d -name "final-r2-tree" | head -n 1)
          
          if [ -z "$FOUND_DIR" ]; then
            echo "[ * ] final-r2-tree hidden, searching via compiled package pool..."
            PKG_POOL=$(find /home/runner/work/ -type d -name "pkg" | grep -v "src/pkg" | head -n 1)
            if [ -n "$PKG_POOL" ]; then
              VERSION_PATH="FreeBSD:${{ matrix.freebsd_version }}:amd64/latest"
              mkdir -p "artifacts/$VERSION_PATH"
              cp -R "$PKG_POOL"/* "artifacts/$VERSION_PATH/"
              printf "%s" "${{ secrets.PKG_SIGNING_KEY_PUB }}" > "artifacts/$VERSION_PATH/hestia.pub"
              cp src/pkg/index.html artifacts/
              cp src/pkg/404.html artifacts/
            else
              echo "Fatal Error: No compiled assets found anywhere in host space!"
              find /home/runner/work/ -type d -maxdepth 4
              exit 1
            fi
          else
            echo "[ ✓ ] Found synchronized asset tree at: $FOUND_DIR"
            cp -R "$FOUND_DIR"/* artifacts/
          fi
          
          echo "=== Verified Aligned Tree Architecture on Host ==="
          ls -R artifacts/
      # 在 Build HestiaCP packages 步骤之后，添加这个新步骤
      - name: Extract and format build log
        if: always() # 即使编译失败也运行
        run: |
          # 检查 build.log 是否存在
          if [ ! -f "build.log" ]; then
            echo "❌ build.log not found!"
            echo "Current directory contents:"
            ls -la
            exit 0
          fi

          echo "✅ build.log found, size: $(wc -l < build.log) lines"

          cat > build-report.md << 'EOF'
          # HestiaCP FreeBSD Build Report

          ## Build Information
          | 项目 | 值 |
          |------|-----|
          | 构建时间 | $(date -u +"%Y-%m-%d %H:%M:%S UTC") |
          | 分支 | ${{ github.ref_name }} |
          | 提交 | ${{ github.sha }} |

          EOF

          # 提取版本信息
          echo "## Version Information" >> build-report.md
          echo '```' >> build-report.md
          grep -E "Build version|Nginx version|PHP version|Web Terminal version" build.log | head -10 >> build-report.md || echo "未找到版本信息" >> build-report.md
          echo '```' >> build-report.md

          # 提取编译状态
          echo "" >> build-report.md
          echo "## Build Status" >> build-report.md
          if grep -q "Compilation completed successfully" build.log 2>/dev/null; then
            echo "✅ **编译成功**" >> build-report.md
          else
            echo "❌ **编译失败**" >> build-report.md
          fi

          # 提取错误和警告
          echo "" >> build-report.md
          echo "## Errors and Warnings" >> build-report.md
          echo '```' >> build-report.md
          grep -E "error|Error|ERROR|warning|Warning|WARNING|failed|Failed|not found" build.log | head -30 >> build-report.md || echo "无错误或警告" >> build-report.md
          echo '```' >> build-report.md

          # 提取包文件大小
          echo "" >> build-report.md
          echo "## Package Sizes" >> build-report.md
          echo '```' >> build-report.md
          grep -E "\.pkg" build.log | grep -E "rw-r|size" >> build-report.md || echo "未找到包文件信息" >> build-report.md
          echo '```' >> build-report.md

          # 提取签名状态
          echo "" >> build-report.md
          echo "## Signing Status" >> build-report.md
          if grep -q "Repository signed successfully" build.log 2>/dev/null; then
            echo "✅ **仓库签名成功**" >> build-report.md
          else
            echo "❌ **仓库签名失败**" >> build-report.md
          fi

          # 提取关键配置检查
          echo "" >> build-report.md
          echo "## Key Checks" >> build-report.md
          echo '```' >> build-report.md
          grep -E "checking for|detected|found|using" build.log | head -20 >> build-report.md || echo "未找到配置检查信息" >> build-report.md
          echo '```' >> build-report.md

          # 提取依赖安装状态
          echo "" >> build-report.md
          echo "## Dependencies" >> build-report.md
          echo '```' >> build-report.md
          grep -E "Installing|pkg install|oniguruma" build.log | head -15 >> build-report.md || echo "未找到依赖安装信息" >> build-report.md
          echo '```' >> build-report.md

          # 提取最终产物
          echo "" >> build-report.md
          echo "## Build Artifacts" >> build-report.md
          echo '```' >> build-report.md
          grep -E "final-packages|artifacts|Build artifacts" build.log | head -10 >> build-report.md || echo "未找到产物信息" >> build-report.md
          echo '```' >> build-report.md

          # 添加退出码
          echo "" >> build-report.md
          echo "## Exit Code" >> build-report.md
          echo '```' >> build-report.md
          grep "Exit code:" build.log | tail -1 >> build-report.md || echo "未找到退出码" >> build-report.md
          echo '```' >> build-report.md

          echo "" >> build-report.md
          echo "---" >> build-report.md
          echo "*报告由 GitHub Actions 自动生成*" >> build-report.md

          echo "✅ Build report generated: build-report.md"
          cat build-report.md

      # 上传报告作为 artifact
      - name: Upload build report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-report
          path: build-report.md
          retention-days: 7

      # 5. 上传到 Cloudflare R2
      - name: Sync Packages to Cloudflare R2
        run: |
          # 1. 严格检查宿主机上刚刚落地的整体 artifacts 拓扑是否存在
          if [ ! -d "artifacts" ]; then
            echo "Error: Base artifacts directory not found!"
            exit 1
          fi

          # 2. 动态拼出当前矩阵正在处理的版本号路径，确保分支存在包资产
          VERSION_PATH="FreeBSD:${{ matrix.freebsd_version }}:amd64/latest"
          ARTIFACT_PATH="artifacts/$VERSION_PATH"
          if [ ! -d "$ARTIFACT_PATH" ]; then
            echo "Error: Matrix sub-path $ARTIFACT_PATH not found!"
            exit 1
          fi

          echo "=== Global files ready in artifacts/ ==="
          ls -la artifacts/
          echo "=== Internal binary packages for FreeBSD ${{ matrix.freebsd_version }} ==="
          ls -la "$ARTIFACT_PATH/"

          ENDPOINT="${{ secrets.R2_ACCOUNT_ENDPOINT }}"
          if [[ ! "$ENDPOINT" =~ ^https?:// ]]; then
            ENDPOINT="https://$ENDPOINT"
          fi

          echo "Syncing specific matrix binaries to s3://fbsd-repo/$VERSION_PATH/"
          aws s3 sync "$ARTIFACT_PATH/" "s3://fbsd-repo/$VERSION_PATH/" \
            --endpoint-url "$ENDPOINT" \
            --follow-symlinks \
            --region auto

          echo "Deploying edge node html headers to bucket root..."
          aws s3 cp artifacts/index.html "s3://fbsd-repo/index.html" --endpoint-url "$ENDPOINT" --region auto
          aws s3 cp artifacts/404.html "s3://fbsd-repo/404.html" --endpoint-url "$ENDPOINT" --region auto
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

      # 6 验证上传
      - name: Verify upload
        run: |
          ENDPOINT="${{ secrets.R2_ACCOUNT_ENDPOINT }}"
          if [[ ! "$ENDPOINT" =~ ^https?:// ]]; then
            ENDPOINT="https://$ENDPOINT"
          fi

          VERSION_PATH="FreeBSD:${{ matrix.freebsd_version }}:amd64/latest"
          echo "=== Verifying uploaded files for $VERSION_PATH on Cloudflare R2 ==="
          aws s3 ls "s3://fbsd-repo/$VERSION_PATH/" --endpoint-url "$ENDPOINT" --recursive --human-readable
          echo "=== Verifying Global HTML on Cloudflare R2 ==="
          aws s3 ls "s3://fbsd-repo/" --endpoint-url "$ENDPOINT" --human-readable | grep -E "(index|404)"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

      # 4. 云端部署边缘计算 Worker 脚本
      - name: Deploy Cloudflare Worker
        run: |
          mkdir -p /tmp/worker-deploy
          cd /tmp/worker-deploy
          cat > worker.js << 'WORKER_EOF'
          const sslRedirectScript = `
            <script>
              if (window.location.protocol === 'http:') {
                window.location.href = window.location.href.replace(/^http:/i, 'https:');
              }
            </script>
          `;

          class HeadInjector {
            element(element) {
              element.prepend(sslRedirectScript, { html: true });
            }
          }

          var worker_default = {
            async fetch(request, env) {
              const url = new URL(request.url);
              if (url.hostname !== "pkg.hestiamb.org") {
                const secureUrl = new URL(request.url);
                secureUrl.protocol = "https:";
                secureUrl.hostname = "pkg.hestiamb.org";
                
                return new Response(null, {
                  status: 301,
                  headers: {
                    "Location": secureUrl.toString(),
                    "Cache-Control": "public, max-age=31536000",
                    "Alt-Svc": 'h3=":443"; ma=31536000; persist=1'
                  }
                });
              }
              let path = url.pathname.slice(1) || "index.html";
              let object = await env.FBSD_REPO.get(path);
              let isNotFound = false;
              
              if (!object) {
                isNotFound = true;
                object = await env.FBSD_REPO.get("404.html");
                if (!object) {
                  return new Response("404 - Not Found", { status: 404 });
                }
              }
              const headers = new Headers();
              object.writeHttpMetadata(headers);
              headers.set("Alt-Svc", 'h3=":443"; ma=31536000; persist=1');
              if (path.endsWith(".html") || isNotFound) {
                headers.set("content-type", "text/html; charset=utf-8");
              } else if (path.endsWith(".sh") || path.endsWith(".pub") || path.endsWith(".sig")) {
                headers.set("content-type", "text/plain; charset=utf-8");
              } else if (path.endsWith(".pkg")) {
                headers.set("content-type", "application/octet-stream");
              }
              const response = new Response(object.body, { 
                status: isNotFound ? 404 : 200, 
                headers 
              });
              const contentType = headers.get("content-type") || "";
              if (contentType.includes("text/html")) {
                return new HTMLRewriter()
                  .on("head", new HeadInjector())
                  .transform(response);
              }
              
              return response;
            }
          };

          export {
            worker_default as default
          };
          WORKER_EOF
          cat > wrangler.toml << 'TOML_EOF'
          name = "hestiacp-repo"
          main = "worker.js"
          compatibility_date = "2024-12-18"
          workers_dev = false

          [[r2_buckets]]
          binding = "FBSD_REPO"
          bucket_name = "fbsd-repo"
          TOML_EOF

          echo "[ * ] Dispatching clean Cloudflare Worker code deployment with HTTP/3 support..."
          npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
