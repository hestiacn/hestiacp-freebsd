name: Build and Deploy FreeBSD pkg Repository

# 触发时机：当发布新 Release、往 main/release 分支推送代码，或者手动点击运行
on:
  release:
    types: [published]
  push:
    branches:
      - main
      - release
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to build"
        required: true
        default: "main"

jobs:
  build-and-deploy:
    name: Build pkg repository and deploy to Cloudflare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Build HestiaCP packages
        uses: vmactions/freebsd-vm@v1
        env:
          PKG_SIGNING_KEY: ${{ secrets.PKG_SIGNING_KEY }}
          PKG_SIGNING_KEY_PUB: ${{ secrets.PKG_SIGNING_KEY_PUB }}
        with:
          release: "14.0"
          usesh: true
          sync: rsync
          copyback: true
          run: |
            export PKG_SIGNING_KEY="${{ secrets.PKG_SIGNING_KEY }}"
            export PKG_SIGNING_KEY_PUB="${{ secrets.PKG_SIGNING_KEY_PUB }}"
            
            # 定义工作空间路径
            WORKSPACE="/home/runner/work/hestiacp-freebsd/hestiacp-freebsd"
            cd "$WORKSPACE"

            pkg install -y bash gmake perl5 git curl pkgconf openssl pcre2 autoconf automake libtool ca_root_nss npm node libxml2 libxslt bison libzip sqlite3 re2c gmp python oniguruma
            
            if [ ! -L /bin/bash ] && [ ! -f /bin/bash ]; then
                ln -sf /usr/local/bin/bash /bin/bash
                echo "[ ✓ ] Created symlink: /bin/bash -> /usr/local/bin/bash"
            fi
            export HESTIA_DEBUG=true

            chmod +x src/hst_autocompile.sh

            bash src/hst_autocompile.sh --all --noinstall --keepbuild main 2>&1 | tee build.log
            EXIT_CODE=$?

            echo "=== Autocompile Exit code: $EXIT_CODE ==="

            if [ $EXIT_CODE -ne 0 ]; then
              echo "[ ✓ ] Compilation completed successfully!"
            else
              echo "[ ✗ ] Error: Compilation failed with exit code $EXIT_CODE"
              echo "=== Last 200 lines of build.log ==="
              tail -200 build.log
              exit 1
            fi

            # 准备签名密钥
            cd /tmp/hestiacp-src
            mkdir -p keys
            printf "%s" "$PKG_SIGNING_KEY" > keys/hestiacp.key
            chmod 600 keys/hestiacp.key

            echo "[ ✓ ] Private key imported for signing"
            ls -la keys/

            cd pkg
            echo "=== Package files ==="
            ls -la

            pkg update -f
            pkg upgrade -y pkg

            echo "[ * ] Signing repository with private key..."
            pkg repo . /tmp/hestiacp-src/keys/hestiacp.key
            ls -la /tmp/hestiacp-src/keys/
            if [ $? -ne 0 ]; then
              echo "[ ✗ ] Failed to sign repository!"
              exit 1
            fi

            echo "[ ✓ ] Repository signed successfully!"

            # 定义版本路径
            FREEBSD_MAJOR=$(uname -r | cut -d. -f1)
            VERSION_PATH="FreeBSD:${FREEBSD_MAJOR}:amd64/latest"
            SAFE_VERSION_PATH=$(echo "$VERSION_PATH" | sed 's/:/_/g')

            # 准备产物到 copyback 目录
            mkdir -p "${WORKSPACE}/artifacts/${VERSION_PATH}"
            
            # 复制所有包文件和签名文件
            cp -R ./* "${WORKSPACE}/artifacts/${VERSION_PATH}/"
            
            # 复制公钥
            printf "%s" "$PKG_SIGNING_KEY_PUB" > "${WORKSPACE}/artifacts/${VERSION_PATH}/hestia.pub"

            # 复制 HTML 文件
            cp "${WORKSPACE}/src/pkg/index.html" "${WORKSPACE}/artifacts/" 2>/dev/null || echo "index.html not found"
            cp "${WORKSPACE}/src/pkg/404.html" "${WORKSPACE}/artifacts/" 2>/dev/null || echo "404.html not found"

            echo "=== Files written to ${WORKSPACE}/artifacts/ ==="
            ls -la "${WORKSPACE}/artifacts/"
            echo "=== Version subdirectory ==="
            ls -la "${WORKSPACE}/artifacts/${VERSION_PATH}/"

      # 验证 artifacts
      - name: Verify and prepare artifacts on host
        run: |
          echo "=== Current workspace contents ==="
          ls -la
          echo "=== artifacts directory ==="
          ls -la artifacts/ || echo "artifacts directory not found!"
          
          if [ -d "artifacts" ] && [ "$(find artifacts -type f | head -1)" ]; then
            echo "[ ✓ ] Artifacts successfully synced from VM"
            echo "=== Full artifacts tree ==="
            find artifacts -type f -exec ls -lh {} \;
          else
            echo "❌ Error: No artifacts found in workspace!"
            exit 1
          fi

      # 3. 上传到 Cloudflare R2
      - name: Sync Packages to Cloudflare R2
        run: |
          if [ ! -d "artifacts" ]; then
            echo "Error: artifacts directory not found!"
            exit 1
          fi

          echo "=== Artifacts to upload ==="
          ls -la artifacts/
          
          VERSION_DIR=$(find artifacts -maxdepth 1 -type d -name "FreeBSD:*" | head -1)
          if [ -n "$VERSION_DIR" ]; then
            echo "=== Found version directory: $VERSION_DIR ==="
            ls -la "$VERSION_DIR/"
          else
            echo "⚠️  No version directory found, but continuing with sync"
          fi

          ENDPOINT="${{ secrets.R2_ACCOUNT_ENDPOINT }}"
          if [[ ! "$ENDPOINT" =~ ^https?:// ]]; then
            ENDPOINT="https://$ENDPOINT"
          fi

          aws s3 sync artifacts/ s3://fbsd-repo \
            --endpoint-url "$ENDPOINT" \
            --follow-symlinks \
            --delete \
            --region auto
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

      - name: Verify upload
        run: |
          ENDPOINT="${{ secrets.R2_ACCOUNT_ENDPOINT }}"
          if [[ ! "$ENDPOINT" =~ ^https?:// ]]; then
            ENDPOINT="https://$ENDPOINT"
          fi

          echo "Verifying uploaded files..."
          aws s3 ls s3://fbsd-repo/ --endpoint-url "$ENDPOINT" --recursive --human-readable | head -30
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

      # Deploy Cloudflare Worker
      - name: Deploy Cloudflare Worker
        run: |
          mkdir -p /tmp/worker-deploy
          cd /tmp/worker-deploy
          cat > worker.js << 'WORKER_EOF'
          var worker_default = {
            async fetch(request, env) {
              const url = new URL(request.url);
              if (url.hostname !== "pkg.hestiamb.org") {
                const secureUrl = new URL(request.url);
                secureUrl.protocol = "https:";
                secureUrl.hostname = "pkg.hestiamb.org";
                
                return new Response(null, {
                  status: 301,
                  headers: {
                    "Location": secureUrl.toString(),
                    "Cache-Control": "public, max-age=31536000",
                    "Alt-Svc": 'h3=":443"; ma=31536000; persist=1'
                  }
                });
              }

              let path = url.pathname;
              if (path === "/" || path === "") {
                path = "index.html";
              } else {
                path = path.startsWith("/") ? path.slice(1) : path;
              }
              const object = await env.FBSD_REPO.get(path);
              
              if (!object) {
                const notFound = await env.FBSD_REPO.get("404.html");
                if (notFound) {
                  return new Response(notFound.body, {
                    status: 404,
                    headers: { "Content-Type": "text/html; charset=utf-8" }
                  });
                }
                return new Response("404 - Not Found", { status: 404 });
              }
              
              const headers = new Headers();
              object.writeHttpMetadata(headers);
              headers.set("Alt-Svc", 'h3=":443"; ma=31536000; persist=1');
              if (path.endsWith(".html")) {
                headers.set("content-type", "text/html; charset=utf-8");
              } else if (path.endsWith(".sh") || path.endsWith(".pub")) {
                headers.set("content-type", "text/plain; charset=utf-8");
              } else if (path.endsWith(".pkg")) {
                headers.set("content-type", "application/octet-stream");
              }
              
              return new Response(object.body, { headers });
            }
          };

          export {
            worker_default as default
          };
          WORKER_EOF
          cat > wrangler.toml << 'TOML_EOF'
          name = "hestiacp-repo"
          main = "worker.js"
          compatibility_date = "2024-12-18"
          workers_dev = false

          [[r2_buckets]]
          binding = "FBSD_REPO"
          bucket_name = "fbsd-repo"
          TOML_EOF

          npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}