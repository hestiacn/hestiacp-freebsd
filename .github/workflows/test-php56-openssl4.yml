name: TEST - PHP 5.6 with OpenSSL 4.x

on:
  release:
    types: [published]
  push:
    branches:
      - mains
      - release
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to build"
        required: true
        default: "main"

jobs:
  test-php56-openssl4:
    name: Test PHP 5.6.40 with OpenSSL 4.x on FreeBSD 14.4
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Build PHP 5.6.40 with OpenSSL 4.x
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.4"
          usesh: true
          sync: rsync
          copyback: true
          run: |
            set -e

            export IGNORE_OSVERSION=yes
            export ASSUME_ALWAYS_YES=yes

            cd /home/runner/work/hestiacp-freebsd/hestiacp-freebsd

            echo "========================================"
            echo "TEST: PHP 5.6.40 with OpenSSL 4.x"
            echo "========================================"

            # 安装编译依赖
            echo "[ * ] Installing build dependencies..."
            pkg update -f
            pkg install -y bash gmake perl5 git curl pkgconf autoconf automake libtool ca_root_nss libxml2 libxslt bison libzip sqlite3 re2c gmp python pcre2 openssl40

            # 创建 bash 软链接
            if [ ! -L /bin/bash ] && [ ! -f /bin/bash ]; then
                ln -sf /usr/local/bin/bash /bin/bash
                echo "[ ✓ ] Created symlink: /bin/bash -> /usr/local/bin/bash"
            fi

            echo ""
            echo "OpenSSL version:"
            /usr/local/bin/openssl version
            echo ""

            # 设置使用 OpenSSL 4.x
            export OPENSSL_PREFIX="/usr/local"
            export OPENSSL_VERSION="4.x"
            export CFLAGS="-I${OPENSSL_PREFIX}/include -I/usr/local/include -Wno-deprecated-declarations"
            export LDFLAGS="-L${OPENSSL_PREFIX}/lib -L/usr/local/lib"
            export PKG_CONFIG_PATH="${OPENSSL_PREFIX}/lib/pkgconfig:/usr/local/lib/pkgconfig"
            export OPENSSL_OPT="--with-openssl=${OPENSSL_PREFIX}"
            export LD_LIBRARY_PATH="${OPENSSL_PREFIX}/lib"

            export ARTIFACT_DIR="/home/runner/work/hestiacp-freebsd/hestiacp-freebsd/artifacts-test"
            mkdir -p "$ARTIFACT_DIR"

            chmod +x src/test-php56-openssl4.sh

            echo "[ * ] Starting PHP 5.6.40 build with OpenSSL 4.x..."
            echo "OPENSSL_OPT: $OPENSSL_OPT"
            echo "CFLAGS: $CFLAGS"
            echo "LDFLAGS: $LDFLAGS"
            echo ""

            # 运行测试脚本
            /usr/local/bin/bash src/test-php56-openssl4.sh 2>&1 | tee build-php56-openssl4.log
            EXIT_CODE=$?

            echo "=== Exit code: $EXIT_CODE ==="

            # ============================================================
            # 完整打印 OpenSSL 4.x 扫描报告
            # ============================================================
            echo ""
            echo "========================================"
            echo "OpenSSL 4.x SCAN REPORTS (FULL)"
            echo "========================================"
            echo ""

            # 报告1: openssl4-scan-report.txt
            if [ -f "/tmp/php-build-test/logs/openssl4-scan-report.txt" ]; then
                echo "========== openssl4-scan-report.txt =========="
                cat "/tmp/php-build-test/logs/openssl4-scan-report.txt"
                echo "========== END =========="
                echo ""
            else
                echo "⚠️  openssl4-scan-report.txt not found"
            fi

            # 报告2: openssl4-missing-functions.txt
            if [ -f "/tmp/php-build-test/logs/openssl4-missing-functions.txt" ]; then
                echo "========== openssl4-missing-functions.txt =========="
                echo "Functions used by PHP 5.6 but NOT found in OpenSSL 4.x:"
                echo ""
                cat "/tmp/php-build-test/logs/openssl4-missing-functions.txt"
                echo "========== END =========="
                echo ""
            else
                echo "⚠️  openssl4-missing-functions.txt not found"
            fi

            # 报告3: php56-used-functions.txt
            if [ -f "/tmp/php-build-test/logs/php56-used-functions.txt" ]; then
                echo "========== php56-used-functions.txt =========="
                echo "OpenSSL functions used by PHP 5.6:"
                echo ""
                cat "/tmp/php-build-test/logs/php56-used-functions.txt"
                echo "========== END =========="
                echo ""
            else
                echo "⚠️  php56-used-functions.txt not found"
            fi

            # 报告4: openssl4-available-functions.txt
            if [ -f "/tmp/php-build-test/logs/openssl4-available-functions.txt" ]; then
                echo "========== openssl4-available-functions.txt =========="
                echo "All functions available in OpenSSL 4.x:"
                echo ""
                cat "/tmp/php-build-test/logs/openssl4-available-functions.txt"
                echo "========== END =========="
                echo ""
            else
                echo "⚠️  openssl4-available-functions.txt not found"
            fi

            # 编译错误
            if [ $EXIT_CODE -ne 0 ]; then
                echo "========================================"
                echo "BUILD ERRORS (FULL)"
                echo "========================================"
                echo ""
                echo "=== All errors ==="
                grep -E "error:|Error:" build-php56-openssl4.log || echo "No errors found"
                echo ""
                echo "========================================"
                echo "Full build log (last 500 lines):"
                echo "========================================"
                tail -500 build-php56-openssl4.log
            fi

            echo ""
            echo "========================================"
            echo "End of OpenSSL 4.x Scan Reports"
            echo "========================================"
            echo ""

            if [ $EXIT_CODE -eq 0 ]; then
                echo "[ ✓ ] PHP 5.6.40 with OpenSSL 4.x compiled successfully!"
            else
                echo "[ ✗ ] Error: Compilation failed with exit code $EXIT_CODE"
                exit 1
            fi

            echo ""
            echo "=== Build artifacts ==="
            ls -la "$ARTIFACT_DIR/" 2>/dev/null || echo "No artifacts found"

            echo "[ ✓ ] Test completed!"

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-php56-openssl4-log
          path: build-php56-openssl4.log
          retention-days: 7

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-php56-openssl4-build-logs
          path: /tmp/php-build-test/logs/
          retention-days: 7

      - name: Upload scan reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: openssl4-scan-reports
          path: /tmp/php-build-test/logs/openssl4-*.txt
          retention-days: 7
