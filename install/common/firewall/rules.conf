#----------------------------------------------------------#
#                     Interfaces                           #
#----------------------------------------------------------#
ext_if = "egress"

#----------------------------------------------------------#
#                     Tables                               #
#----------------------------------------------------------#
table <bruteforce> persist
table <fail2ban> persist

#----------------------------------------------------------#
#                     Options                              #
#----------------------------------------------------------#
set skip on lo0
set block-policy drop
set loginterface $ext_if
set optimization aggressive
set state-policy if-bound
set state-policy floating

# Timeout Settings
set timeout { 
    tcp.first 60, 
    tcp.opening 30, 
    tcp.established 3600, 
    tcp.closing 60, 
    tcp.finwait 30
}

#----------------------------------------------------------#
#               NAT (Dual NIC scenario)                    #
#----------------------------------------------------------#
# Enable NAT if the internal network interface is defined
# nat on $ext_if from $int_if:network to any -> ($ext_if)

#----------------------------------------------------------#
#                     Normalization                        #
#----------------------------------------------------------#
scrub in on $ext_if all fragment reassemble
scrub in on $ext_if no-df

#----------------------------------------------------------#
#                     Default Policies                     #
#----------------------------------------------------------#
block in log all
pass out quick all keep state

#----------------------------------------------------------#
#                     Blacklists                           #
#----------------------------------------------------------#
block in quick from <bruteforce> to any
block in quick from <fail2ban> to any

#----------------------------------------------------------#
#                     ICMP                                 #
#----------------------------------------------------------#
pass in on $ext_if inet proto icmp all icmp-type { 
    echoreq, unreach, timex, paramprob 
} keep state

#----------------------------------------------------------#
#                     Services                             #
#----------------------------------------------------------#

# SSH
pass in quick on $ext_if proto tcp to any port 22 flags S/SA keep state (max-src-conn-rate 5/30, overload <bruteforce> flush global)

# WEB
pass in quick on $ext_if proto tcp to any port { 80, 443 } flags S/SA keep state

# HESTIA Control Panel
pass in quick on $ext_if proto tcp to any port 8083 flags S/SA keep state

# Mail Services
pass in quick on $ext_if proto tcp to any port { 
    25,      # SMTP
    465,     # SMTPS
    587,     # SMTP Submission
    110,     # POP3
    995,     # POP3S
    143,     # IMAP
    993      # IMAPS
} flags S/SA keep state

# DNS
pass in quick on $ext_if proto { tcp, udp } to any port 53 keep state

# FTP
pass in quick on $ext_if proto tcp to any port { 21, 12000:12100 } flags S/SA keep state
